name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21.x"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -ldflags="-X main.version=${GITHUB_REF_NAME}" .

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_ext: ""
            archive_ext: ".tar.gz"
            archive_format: "tar.gz"
          - goos: linux
            goarch: arm64
            binary_ext: ""
            archive_ext: ".tar.gz"
            archive_format: "tar.gz"
          - goos: darwin
            goarch: amd64
            binary_ext: ""
            archive_ext: ".tar.gz"
            archive_format: "tar.gz"
          - goos: darwin
            goarch: arm64
            binary_ext: ""
            archive_ext: ".tar.gz"
            archive_format: "tar.gz"
          - goos: windows
            goarch: amd64
            binary_ext: ".exe"
            archive_ext: ".zip"
            archive_format: "zip"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21.x"
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY_EXT: ${{ matrix.binary_ext }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
        run: |
          version="${GITHUB_REF_NAME}"
          binary="gotidy${BINARY_EXT}"
          archive="gotidy_${version}_${GOOS}_${GOARCH}${ARCHIVE_EXT}"

          mkdir -p dist package
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "package/${binary}" .

          if [ "${ARCHIVE_FORMAT}" = "zip" ]; then
            (
              cd package
              zip -q "../dist/${archive}" "${binary}"
            )
          else
            tar -C package -czf "dist/${archive}" "${binary}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
